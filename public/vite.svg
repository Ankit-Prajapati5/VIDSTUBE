<svg xmlns="http://www.w3.org/2000/svg" width="31.88" height="32" viewBox="0 0 256 257">

  <defs>

    <!-- Premium Gradient -->
    <linearGradient id="vidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0057"></stop>
      <stop offset="100%" stop-color="#ff7a18"></stop>
    </linearGradient>

    <linearGradient id="playGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5a0"></stop>
      <stop offset="100%" stop-color="#00d9f5"></stop>
    </linearGradient>

  </defs>

  <!-- Background Circle -->
  <circle cx="128" cy="128" r="120" fill="url(#vidGradient)"></circle>

  <!-- Play Button -->
  <polygon points="105,85 175,128 105,170" fill="url(#playGradient)"></polygon>

  <!-- Download Arrow -->
  <line x1="128" y1="50" x2="128" y2="110" stroke="white" stroke-width="14" stroke-linecap="round"></line>

  <polygon points="108,105 148,105 128,140" fill="white"></polygon>

</svg>